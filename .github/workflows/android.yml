name: Android CI

on:
  push:
    branches: [main]
    paths: ["android/**", ".github/workflows/android.yml"]
  pull_request:
    paths: ["android/**", ".github/workflows/android.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # gradle-wrapper.jar is not committed, so provision Gradle directly
      # (pinned to the version in gradle-wrapper.properties).
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Unit tests and debug build
        run: gradle :app:testDebugUnitTest :app:assembleDebug
      # settings.gradle.kts redirects the build dir to ~/.gradle-builds
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: ~/.gradle-builds/FenLightCompanion/app/reports/tests/
